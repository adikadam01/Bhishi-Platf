spring.application.name=bhishi-platform
server.port=8080
spring.data.mongodb.uri=mongodb://localhost:27017/bhishi_db
app.jwt.secret=bhishi_super_secret_key_minimum_256_bits_change_in_production_env
app.jwt.expiration-ms=86400000
app.otp.expiry-minutes=10
app.otp.length=6
razorpay.key.id=rzp_test_XXXXXXXXXXXXXXXX
razorpay.key.secret=XXXXXXXXXXXXXXXXXXXXXXXX
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@bhishi.com
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/
app.cors.allowed-origins=http://localhost:3000,https://bhishi.vercel.app
logging.level.com.bhishi=DEBUG
logging.level.org.springframework.security=INFO
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
